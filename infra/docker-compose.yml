version: "3.9"
services:
  api:
    build: ../apps/api
    env_file:
      - ../apps/api/.env
    ports:
      - "8000:8000"
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../apps/api:/app
  web:
    build: ../apps/web
    env_file:
      - ../apps/web/.env
    ports:
      - "5173:5173"
    command: pnpm dev --host
    volumes:
      - ../apps/web:/app
